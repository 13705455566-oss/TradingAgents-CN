name: TradingAgents-CN 股票分析

on:
  workflow_dispatch:
    inputs:
      stock_codes:
        description: '股票代码 (多个用逗号分隔)'
        required: true
        default: '600032'
      analyze_date:
        description: '分析日期 (YYYY-MM-DD)'
        required: false
        default: ''
      deep_level:
        description: '分析深度 (1-5)'
        required: false
        default: '2'

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      
      - name: 批量运行AI分析
        run: |
          python
