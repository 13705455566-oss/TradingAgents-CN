name: 股票分析

on:
  workflow_dispatch:
    inputs:
      stock_code:
        description: '股票代码'
        required: true
        default: '600032'

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - run: pip install tradingagents-cn
      - run: python -c "from tradingagents.agentchat import AgentChat;print(AgentChat(stock_code='${{ github.event.inputs.stock_code }}').run())"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
